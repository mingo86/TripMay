desc:{it:"Giornata ricchissima tra borghi sospesi nel tempo! Civita di Bagnoregio — 'la città che muore' su una rupe di tufo raggiungibile solo a piedi. Poi Orvieto: Duomo con mosaici dorati e il Pozzo di San Patrizio (248 scalini a doppia elica!). Pranzo con umbrichelli al tartufo. Nel pomeriggio Narni — il borgo che ha ispirato Le Cronache di Narnia — con il sottoterra misterioso e le acque turchesi di Stifone. Se c'è tempo, fermata al borgo degli artisti di Calcata. Arriviamo dall'amico per cena alle 20–21.",pt:"Dia riquíssimo entre vilarejos suspensos no tempo! Civita di Bagnoregio — 'a cidade que morre' sobre um penhasco de tufo acessível só a pé. Depois Orvieto: Duomo com mosaicos dourados e o Poço de São Patrício (248 degraus em dupla hélice!). Almoço com umbrichelli ao trufa. À tarde Narni — o vilarejo que inspirou As Crônicas de Nárnia — com o subterrâneo misterioso e as águas turquesa de Stifone. Se der tempo, parada em Calcata, vilarejo dos artistas. Chegamos ao amigo para jantar às 20–21."},

if(d.alert)h+='<div class="alert"><b>'+(lang==='it'?'Attenzione: ':'Atenção: ')+'</b>'+T(d.alert)+'</div>';
const dt=T(d.dt),dtParts=dt.split('·');
document.getElementById('days').innerHTML='<div class="day show"><div class="day-hdr"><h2><span>'+dtParts[0].trim()+'</span> · '+(dtParts.slice(1).join('·').trim()||'')+'</h2><p>'+T(d.sb)+'</p></div><div class="day-body">'+h+'</div></div>';
// Map
if(d.map){setTimeout(()=>{const el=document.getElementById('map-'+d.id);if(!el||el._leaflet_id)return;const m=L.map(el).setView(d.map.center,d.map.zoom);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM',maxZoom:18}).addTo(m);const lls=[];d.map.pts.forEach(p=>{L.marker(p.ll).addTo(m).bindPopup('<b>'+p.n+'</b>');lls.push(p.ll)});if(lls.length>1){const line=L.polyline(lls,{color:'#1B3A5C',weight:2,dashArray:'6,4',opacity:.7}).addTo(m);m.fitBounds(line.getBounds().pad(.15))}},120)}
// Summary
let tf=0,tp=0,tc=0;
DAYS.forEach((day,i)=>{const ss=sel[i]||{};day.fr.forEach((_,j)=>{if(ss["f"+j])tf++});day.pd.forEach((a,j)=>{if(ss["p"+j]){tp++;const mm=(a.pr||'').match(/(\d+)/);if(mm)tc+=parseInt(mm[1])}})});
document.getElementById('summary').innerHTML='<div class="sum-title">'+(lang==='it'?'Riepilogo selezioni':'Resumo seleções')+'</div><div class="sum-grid"><div><div class="sum-val">'+tf+'</div><div class="sum-label">'+(lang==='it'?'gratuite':'gratuitas')+'</div></div><div><div class="sum-val">'+tp+'</div><div class="sum-label">'+(lang==='it'?'a pagamento':'pagas')+'</div></div><div><div class="sum-val">~€'+tc+'</div><div class="sum-label">'+(lang==='it'?'costo attrazioni':'custo atrações')+'</div></div><div><div class="sum-val">~€499</div><div class="sum-label">'+(lang==='it'?'trasporti (×2)':'transportes (×2)')+'</div></div></div>';
}
function toggle(dayIdx,key,isLocked){if(isLocked)return;if(!sel[dayIdx])sel[dayIdx]={};sel[dayIdx][key]=!sel[dayIdx][key];save();render()}
renderCollapsibles();render();
</script></body></html>
